name: Fetch Market Data

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: false
        default: "pc"
        type: choice
        options: [pc, ps4, xbox, switch]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Fetch data
        run: node fetch-data.js ${{ github.event.inputs.platform || 'pc' }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet || git commit -m "Update market data $(date -u +%Y-%m-%d)"
          git push
